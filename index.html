<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LLB-s03</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-alerts/dist/styles.css">
  
  <style>
  :root {
    --theme-color: #007bff; /* Professional Blue */
  }

  /* 1. Typography */
  body {
    font-size: 18px;
    line-height: 1.6;
  }

  /* 2. SMART LAYOUT: Mobile vs Desktop */
  
  /* MOBILE (Default): Edge-to-edge for your phone */
  .content {
    position: static !important;
    width: 100% !important;
  }

  .markdown-section {
    max-width: 100% !important;
    padding: 15px !important; /* Tiny gutter for phone edges */
    margin: 0 !important;
  }

  /* DESKTOP (Mac Mini): Proper spacing and sidebar alignment */
  @media screen and (min-width: 769px) {
    .content {
      position: relative !important; /* Reset from static */
      margin-left: 300px; /* Moves text out from under the sidebar */
      width: auto !important;
    }

    .markdown-section {
      max-width: 90% !important; /* Professional width for reading law notes */
      margin: 0 auto !important;
      padding: 40px !important;
    }
  }

  /* 3. High-Quality Tables */
  table {
    display: table !important; 
    width: 100% !important;
    border-collapse: collapse;
    margin-bottom: 1.5rem;
    overflow-x: auto;
  }

  th, td {
    padding: 12px !important;
    border: 1px solid #dfe2e5;
    text-align: left;
  }

  th {
    background-color: #f8f8f8;
    font-weight: bold;
  }

  /* 4. Link Styling */
  .markdown-section a {
    color: var(--theme-color) !important;
    text-decoration: none;
  }

  .markdown-section a:hover {
    text-decoration: underline;
  }

  /* 5. Sidebar & Toggle Fixes */
  .sidebar-toggle {
    bottom: auto !important;
    top: 10px !important;
    left: 10px !important;
    background-color: rgba(255, 255, 255, 0.9) !important;
    border-radius: 4px;
    width: 35px !important;
    height: 35px !important;
    padding: 5px !important;
  }

  .sidebar ul li a {
    font-size: 16px;
  }

  section.content {
    padding-top: 40px;
  }
</style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'LLB-s03',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      mergeNavbar: true,
      // Markdown Alerts Configuration
      'alerts': {
        theme: 'vue',
      }
    }
  </script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-alerts/dist/index.min.js"></script>
  
  <script src="//cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script>
    var config = { 
      startOnLoad: true, 
      flowChart: { useMaxWidth: true, htmlLabels: true },
      theme: 'default'
    };
    mermaid.initialize(config);
  </script>
</body>
</html>
