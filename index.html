<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LLB-LU</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-alerts/dist/styles.css">
  
 <style>
  :root {
    --theme-color: #007bff;
  }
  html {
    
    /* This creates the necessary 'gap' for both phone and PC */
    scroll-padding-top: 80px !important; 
    scroll-behavior: smooth;
  }

  /* 1. Typography */
  body {
    font-size: 18px;
    line-height: 1.6;
    background-color: #f0f2f5 !important; /* Grey 'desk' background */
    margin: 0;
  }

  /* 2. THE MASTER LAYOUT (Desktop) */
  @media screen and (min-width: 769px) {
    /* This creates the 'white paper' look centered on your 27" monitor */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      bottom: 0;
      left: calc(50% - 600px); /* 600 is half of our 1200px width */
      width: 1200px;
      background: white;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      z-index: -1;
    }

    /* Keep Sidebar anchored to the left of the centered paper */
    .sidebar {
      left: calc(50% - 600px) !important;
      width: 300px !important;
      background-color: #fafafa !important;
      border-right: 1px solid #eee;
    }

    /* Content sits exactly next to the sidebar within the paper */
    .content {
      position: absolute !important;
      left: calc(50% - 300px) !important; /* Center - 600 + 300 sidebar */
      width: 900px !important; /* Wikipedia/Google style readable width */
      right: auto !important;
    }

    .markdown-section {
      max-width: 100% !important;
      padding: 40px 60px !important;
      margin: 0 !important;
    }

    /* Menu button stays with the centered content */
    .sidebar-toggle {
      left: calc(50% - 590px) !important;
      position: fixed !important;
    }

    /* Full 900px width if sidebar is hidden */
    body.close .content {
      left: calc(50% - 450px) !important; /* Half of 900 */
    }

  }

  /* 3. MOBILE VIEW (Phone stays edge-to-edge) */
  @media screen and (max-width: 768px) {
    body { background-color: white !important; }
    .content { position: static !important; width: 100% !important; }
    .markdown-section { padding: 0px !important; }
    .sidebar-toggle { left: 10px !important; }
  }

  /* 4. High-Quality Tables */
  table {
    display: table !important;
    width: 100% !important;
    border-collapse: collapse;
    margin-bottom: 1.5rem;
  }
  th, td {
    padding: 12px !important;
    border: 1px solid #dfe2e5;
  }
  th { background-color: #f8f8f8; font-weight: bold; }

  /* 5. Sidebar Toggle Z-Index */
  .sidebar-toggle {
    bottom: auto !important;
    top: 10px !important;
    background-color: rgba(255, 255, 255, 0.9) !important;
    z-index: 1000;
  }
</style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'LLB-LU',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      mergeNavbar: true,
      // Markdown Alerts Configuration
      'alerts': {
        theme: 'vue',
      }
    }
  </script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-alerts/dist/index.min.js"></script>
  
  <script src="//cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script>
    var config = { 
      startOnLoad: true, 
      flowChart: { useMaxWidth: true, htmlLabels: true },
      theme: 'default'
    };
    mermaid.initialize(config);
  </script>
</body>
</html>
