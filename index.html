<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LLB-LU</title>
    <meta name="description" content="Law Notes and Resources for LLB Students.">
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">
    <link rel="stylesheet" href="https://unpkg.com/docsify-plugin-toc@1.3.1/dist/light.css">

    <style>
      :root{ --base-font-size: 18px; }
      /* Base text */
      body, .markdown-section, .sidebar-nav { font-size: var(--base-font-size); color: #000000; }

      /* Docsify TOC overrides to improve readability */
      .toc, .toc-nav, .markdown-toc, .docsify-plugin-toc {
        font-size: 16px !important;
        font-weight: 600 !important;
        color: #0b2540 !important;
        line-height: 1.4 !important;
      }

      .toc a, .toc-nav a, .markdown-toc a { 
        font-weight: 600 !important; 
        color: #003dc2 !important; 
        text-decoration: none !important; 
        
      }

      /* Nested TOC items slightly smaller */
      .toc ul ul, .toc-nav ul ul, .markdown-toc ul ul { 
        font-size: 15px !important; 
        font-weight: 500 !important; 
        margin-left: 10px !important; 
        
      }

      /* TOC title style */
      .toc .toc-title, .toc-nav .toc-title, .markdown-toc .toc-title, .docsify-plugin-toc .toc-title {
        font-weight: 800 !important;
        font-size: 16px !important;
        margin-bottom: 8px !important;
        color: #0b2540 !important;
      }

    </style>
    <style>
      /* LEFT SIDEBAR customizations */
      /* Increase base font size and weight for sidebar links */
      .sidebar {
        font-size: 18px; /* base size for sidebar container */
        color: #1f2937;
      }
      .sidebar-nav, .sidebar-nav li a {
        font-size: 16px !important;
        font-weight: 400 !important;
        color: #1f2937 !important;
        padding: 0px 10px !important;
      }
      /* Sidebar section titles / headings */
      .sidebar .sidebar-title, .sidebar .sidebar-heading {
        font-size: 14px !important;
        font-weight: 800 !important;
        color: #0b2540 !important;
        margin-top: 8px !important;
        margin-bottom: 6px !important;
      }
      /* Make active sidebar link more prominent */
      .sidebar-nav li.active > a {
        background: #eef4ff !important;
        color: #0019fa !important;
        font-weight: 800 !important;
      }
    </style>
    <style>
      /* RHS TOC: make the active / current item as prominent as the left sidebar */
      .toc-nav li.active > a,
      .toc-nav a.active,
      .toc-nav a[aria-current="true"],
      .toc li.active > a,
      .toc a.active,
      .toc a[aria-current="true"],
      .markdown-toc li.active > a,
      .markdown-toc a.active,
      .markdown-toc a[aria-current="true"],
      .docsify-plugin-toc li.active > a,
      .docsify-plugin-toc a.active,
      .docsify-plugin-toc a[aria-current="true"] {
        background: #eef4ff !important;
        color: #0019fa !important;
        font-weight: 800 !important;
        border-radius: 4px !important;
        padding: 4px 6px !important;
      }

      /* Slight hover effect for TOC items */
      .toc-nav a:hover,
      .toc a:hover,
      .markdown-toc a:hover,
      .docsify-plugin-toc a:hover {
        background: rgba(0, 72, 255, 0.06) !important;
        color: #0037b8 !important;
      }
    </style>
   
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script>
      window.$docsify = {
        name: 'LLB-LU',
        loadSidebar: true,
        subMaxLevel: 0,
        auto2top: true,
        mergeNavbar: true,
        toc: {
          tocMaxLevel: 5,
    target: 'h2, h3, h4, h5, h6',
    ignoreHeaders:  ['<!-- {docsify-ignore} -->', '<!-- {docsify-ignore-all} -->']
        }
      };
    </script>

    <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-plugin-toc/dist/docsify-plugin-toc.min.js"></script>
    <script src="https://unpkg.com/docsify-plugin-toc@1.3.1/dist/docsify-plugin-toc.min.js"></script>
  </body>
</html>
